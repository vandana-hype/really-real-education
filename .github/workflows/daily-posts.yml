name: Daily Posts Feed

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  publish-daily-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate daily post
        run: node scripts/daily-post.js
        env:
          SITE_URL: https://reallyrealeducation.org

      - name: Generate RSS
        run: node scripts/generate-rss.js
        env:
          SITE_URL: https://reallyrealeducation.org

      - name: Generate post pages
        run: node scripts/generate-post-pages.js
        env:
          SITE_URL: https://reallyrealeducation.org

      - name: Update social meta tags
        run: node scripts/update-social-meta.js
        env:
          SITE_URL: https://reallyrealeducation.org

      - name: Publish latest post to LinkedIn
        run: node scripts/post-to-linkedin.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          LINKEDIN_INCLUDE_POST_URL: "false"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/linkedin-last-posted.json Cogentic.html posts/ rss.xml
          git diff --cached --quiet || git commit -m "chore: add automated daily post"
          git push
